name: Build host binaries

# Phase 3: build the single-binary spaiglass-host for all 5 supported
# platforms via `bun build --compile`. Runs on every tag push and on manual
# workflow_dispatch. Each target produces one tarball:
#   spaiglass-host-<target>.tar.gz
# containing the binary, a static/ frontend dir, and a VERSION file.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release:
        description: "Attach artifacts to a GitHub release (requires a tag)"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x64
          - linux-arm64
          - darwin-x64
          - darwin-arm64
          - windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node.js (for the frontend build)
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: latest

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install backend deps (bun)
        run: bun install --frozen-lockfile
        working-directory: backend
        # The bun-compile step needs the dep tree resolved to bundle the
        # SDK and node_modules:* imports. We don't ship node_modules.

      - name: Compile binary for ${{ matrix.target }}
        run: ./scripts/build-binary.sh ${{ matrix.target }}
        working-directory: backend

      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: spaiglass-host-${{ matrix.target }}
          path: backend/dist/spaiglass-host-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          path: ./artifacts

      - name: Generate checksums
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          cd release
          sha256sum *.tar.gz > checksums.txt
          ls -la

      - name: Attach binaries to GitHub release
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836 # v2.3.3
        with:
          files: |
            release/*.tar.gz
            release/checksums.txt
          draft: true
          generate_release_notes: true
