name: Build host binaries

# Phase 3: build the single-binary spaiglass-host for all 5 supported
# platforms via `bun build --compile`. Runs on every tag push and on manual
# workflow_dispatch. Each target produces one tarball:
#   spaiglass-host-<target>.tar.gz
# containing the binary, a static/ frontend dir, and a VERSION file.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release:
        description: "Attach artifacts to a GitHub release (requires a tag)"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x64
          - linux-arm64
          - darwin-x64
          - darwin-arm64
          - windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node.js (for the frontend build)
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: latest

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          GIT_SHA: ${{ github.sha }}
          SPAIGLASS_VERSION: ${{ github.ref_name }}

      - name: Install backend deps (bun)
        run: bun install --frozen-lockfile
        working-directory: backend
        # The bun-compile step needs the dep tree resolved to bundle the
        # SDK and node_modules:* imports. We don't ship node_modules.

      - name: Compile binary for ${{ matrix.target }}
        run: ./scripts/build-binary.sh ${{ matrix.target }}
        working-directory: backend

      - name: Upload tarball artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: spaiglass-host-${{ matrix.target }}
          path: backend/dist/spaiglass-host-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout (for frontend build to compute bundle hash)
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (for bundle hash)
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          GIT_SHA: ${{ github.sha }}
          SPAIGLASS_VERSION: ${{ github.ref_name }}

      - name: Compute frontend bundle hash
        id: bundle_hash
        run: |
          HASH=$(sha256sum frontend/dist/index.html | cut -d' ' -f1)
          echo "frontend_sha256=$HASH" >> "$GITHUB_OUTPUT"
          echo "Frontend bundle SHA-256: $HASH"

      - name: Download build artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          path: ./artifacts

      - name: Generate checksums
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          cd release
          sha256sum *.tar.gz > checksums.txt
          ls -la

      - name: Attest build provenance (Sigstore)
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-path: release/*.tar.gz

      - name: Attach binaries to GitHub release
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836 # v2.3.3
        with:
          tag_name: ${{ github.ref_name }}
          name: SpAIglass ${{ github.ref_name }}
          files: |
            release/*.tar.gz
            release/checksums.txt
          draft: false
          body: |
            ## Verification

            **Frontend bundle hash (index.html):**
            ```
            frontend_sha256: ${{ steps.bundle_hash.outputs.frontend_sha256 }}
            commit: ${{ github.sha }}
            ```

            **Verify the live relay is serving this release:**
            ```bash
            curl -s https://spaiglass.xyz/api/health | jq '{commit, frontend_sha256}'
            # Should match the values above
            ```

            **Verify artifact provenance (Sigstore):**
            ```bash
            gh attestation verify spaiglass-host-linux-x64.tar.gz --repo c0inz/spaiglass
            ```

            ---
