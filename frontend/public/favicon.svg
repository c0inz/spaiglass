<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="brass" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#dab45c"/>
      <stop offset="40%" stop-color="#c49a3c"/>
      <stop offset="75%" stop-color="#a07828"/>
      <stop offset="100%" stop-color="#7a5c1c"/>
    </linearGradient>
    <linearGradient id="brassHi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8c86c"/>
      <stop offset="100%" stop-color="#c49a3c"/>
    </linearGradient>
    <radialGradient id="lens" cx="0.38" cy="0.32" r="0.55">
      <stop offset="0%" stop-color="#5a9ee0"/>
      <stop offset="45%" stop-color="#2563a0"/>
      <stop offset="100%" stop-color="#0f1f33"/>
    </radialGradient>
  </defs>

  <!-- Tube body — tapered trapezoid, upper-left to lower-right -->
  <polygon points="12,10 16,8 46,38 50,50 46,52 42,40" fill="url(#brass)"/>
  <!-- Highlight edge (upper face of tube) -->
  <polygon points="12,10 16,8 46,38 42,40" fill="url(#brassHi)" opacity="0.45"/>

  <!-- Brass band near eyepiece -->
  <line x1="19" y1="12" x2="16" y2="16" stroke="#e8c86c" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Brass band mid-tube -->
  <line x1="26" y1="19" x2="23" y2="23" stroke="#e8c86c" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Eyepiece knob -->
  <circle cx="13" cy="10" r="3.8" fill="url(#brass)" stroke="#7a5c1c" stroke-width="0.6"/>
  <circle cx="12.2" cy="9.2" r="1.3" fill="#e8c86c" opacity="0.4"/>

  <!-- Lens housing — outer brass ring -->
  <circle cx="46" cy="46" r="12" fill="url(#brass)" stroke="#7a5c1c" stroke-width="0.8"/>
  <!-- Inner ring highlight -->
  <circle cx="46" cy="46" r="10.2" fill="none" stroke="#dab45c" stroke-width="0.7"/>

  <!-- Blue lens -->
  <circle cx="46" cy="46" r="9" fill="url(#lens)"/>

  <!-- Lens reflection -->
  <ellipse cx="43.5" cy="43" rx="4" ry="3.2" fill="white" opacity="0.15"/>
  <circle cx="42" cy="42" r="1.8" fill="white" opacity="0.35"/>
</svg>
