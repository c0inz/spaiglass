<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#131318"/>

  <g fill="#ffffff">
    <!-- Outer eye (pointed almond, ~2:1 aspect ratio) -->
    <path fill-rule="evenodd" d="
      M 2,32
      C 7,15 20,12 32,12 C 44,12 57,15 62,32
      C 57,49 44,52 32,52 C 20,52 7,49 2,32 Z
      M 9,32
      C 13,21 22,17 32,17 C 42,17 51,21 55,32
      C 51,43 42,47 32,47 C 22,47 13,43 9,32 Z
    "/>

    <!-- Crescent bridge — left inner eyelid flows into iris -->
    <path d="
      M 21.5,26.5
      C 16,28 9,30 9,32
      C 9,34 16,36 21.5,37.5
      A 11,11 0 0,0 21.5,26.5 Z
    "/>

    <!-- Iris ring -->
    <path fill-rule="evenodd" d="
      M 20,32 A 11,11 0 1,1 42,32 A 11,11 0 1,1 20,32 Z
      M 24,32 A 7,7 0 1,0 38,32 A 7,7 0 1,0 24,32 Z
    "/>

    <!-- Pupil — pac-man, notch facing upper-left -->
    <path d="M 31,32 L 27,28 A 5,5 0 1,1 26,33 Z"/>
  </g>
</svg>
